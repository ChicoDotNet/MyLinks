name: Check links

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 12 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            './**/*.md'
          fail: true
